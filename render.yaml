services:
  # Backend Service
  - type: web
    name: quick-tasks-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: quick_tasks_db
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: 8001
    healthCheckPath: /api/

  # Frontend Service
  - type: web
    name: quick-tasks-frontend
    runtime: node
    rootDir: frontend
    buildCommand: yarn install && yarn build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
      - key: NODE_VERSION
        value: 18.17.0
    healthCheckPath: /

databases:
  # Optional: If you want to use Render's managed MongoDB
  # Uncomment this section if needed
